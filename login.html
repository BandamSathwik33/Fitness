<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

        <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="overflow-x-hidden" style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/images/banner2.webp') center/cover no-repeat fixed;">
    <!-- Back to Home -->
    <!-- <a href="index.html" class="back-home" data-aos="fade-right" data-aos-delay="100">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Back to Home</span>
    </a> -->

    <a href="index.html"
            class=" back-home">
            <i class="fa fa-arrow-left me-2"></i>Back To Home
        </a>

    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-5 mt-4">

        <!-- <a href="index.html"
            class="text-white text-decoration-none fw-bold shadow-sm px-3 py-2 rounded-pill bg-dark bg-opacity-25 border border-white border-opacity-25 mb-4 d-inline-block transition-all">
            <i class="fa fa-arrow-left me-2"></i>Back To Home
        </a> -->

        <div class="card shadow-lg border-0 rounded-5 w-100"
            style="max-width:450px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);">

            <div class="card-body p-4 p-sm-5">

                <div class="text-center mb-4">

                    <div class="bg-primary rounded-circle d-inline-flex p-3 mb-3 shadow">
                        <img src="assets/images/logoStackly.webp"
                            alt="logo"
                            height="30">
                    </div>

                    <h2 class="fw-bold text-dark">
                        Welcome Back
                    </h2>

                    <p class="text-muted small">
                        Enter your credentials to access your fitness dashboard
                    </p>

                </div>

                <form id="loginForm" data-aos="fade-up" data-aos-delay="400">

                    <div class="mb-3">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light border-end-0 rounded-start-pill">
                                <i class="fa fa-briefcase text-muted"></i>
                            </span>
                            <select class="form-select bg-light border-start-0 rounded-end-pill" id="loginRole" required>
                                <option value="">Select Role</option>
                                <option>Admin</option>
                                <option>Trainer</option>
                                <option>Member</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group input-group-lg mb-3">

                        <span class="input-group-text bg-light border-end-0 rounded-start-pill">
                            <i class="fa fa-envelope text-muted"></i>
                        </span>

                        <input type="email"
                            class="form-control bg-light border-start-0 rounded-end-pill"
                            id="loginEmail"
                            placeholder="Email Address"
                            required>

                    </div>

                    <div class="input-group input-group-lg mb-3">

                        <span class="input-group-text bg-light border-end-0 rounded-start-pill">
                            <i class="fa fa-lock text-muted"></i>
                        </span>

                        <input type="password"
                            class="form-control bg-light border-start-0 border-end-0"
                            id="loginPassword"
                            placeholder="Password"
                            required>
                        <span class="input-group-text bg-light border-start-0 rounded-end-pill toggle-password" style="cursor: pointer;">
                            <i class="fa fa-eye-slash text-muted"></i>
                        </span>

                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4 px-2">

                        <div class="form-check">

                            <input class="form-check-input"
                                type="checkbox"
                                id="remember">

                            <label class="form-check-label small"
                                for="remember">

                                Remember Me

                            </label>

                        </div>

                        <a href="#"
                            class="text-decoration-none small fw-bold primary">

                            Forgot Password?

                        </a>

                    </div>

                    <button
                        class="btn btn-warning btn-lg w-100 fw-bold rounded-pill shadow">

                        Login
                        <i class="fa fa-sign-in ms-2"></i>

                    </button>

                </form>

                <div class="text-center mt-4">

                    <p class="mb-0">

                        Don't have an account?

                        <a href="signup.html"
                            class="fw-bold text-decoration-none primary">

                            Register

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

    <!-- AOS Animation JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
    <script src="js/auth.js"></script>

</body>

</html>
